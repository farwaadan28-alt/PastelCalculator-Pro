<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PastelCalc Pro Edition</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sparkle-vector" style="top: 15%; left: 12%;"></div>
    <div class="sparkle-vector" style="top: 78%; left: 18%;"></div>
    <div class="sparkle-vector" style="top: 22%; left: 82%;"></div>
    <div class="sparkle-vector" style="top: 72%; left: 86%;"></div>

    <div class="utility-bar">
        <button class="util-btn" onclick="toggleTheme()">🌓 Dark Mode</button>
        <button class="util-btn" onclick="toggleHistory()">📜 History</button>
    </div>
    
        <!-- main container for the whole calculator app -->

    <div class="app-container">
        
        <svg class="panda-companion" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="25" cy="40" rx="14" ry="12" fill="#3d2f3b" stroke="var(--primary-theme)" stroke-width="5.5"/>
            <ellipse cx="75" cy="40" rx="14" ry="12" fill="#3d2f3b" stroke="var(--primary-theme)" stroke-width="5.5"/>
            <ellipse cx="50" cy="65" rx="44" ry="34" fill="var(--panda-head)" stroke="var(--primary-theme)" stroke-width="5.5"/>
            <ellipse cx="32" cy="63" rx="11" ry="8" fill="#3d2f3b" transform="rotate(-15, 32, 63)"/>
            <ellipse cx="68" cy="63" rx="11" ry="8" fill="#3d2f3b" transform="rotate(15, 68, 63)"/>
            <circle cx="34" cy="62" r="3" fill="#ffffff"/>
            <circle cx="66" cy="62" r="3" fill="#ffffff"/>
            <ellipse cx="50" cy="67" rx="4" ry="2.5" fill="#3d2f3b"/>
            <ellipse cx="20" cy="73" rx="6" ry="3.5" fill="#ffd3f3"/>
            <ellipse cx="80" cy="73" rx="6" ry="3.5" fill="#ffd3f3"/>
        </svg>

            <div class="calculator">

                 <!-- screen display-->

            <div class="display-container">
                <div class="display" id="screen">0</div>
            </div>

                     <!-- all of the buttons -->

            <div class="buttons">
                <button class="clear" onclick="clearScreen()">C</button>
                <button class="operator" onclick="appendOperator('/')">&divide;</button>
                <button class="operator" onclick="appendOperator('*')">&times;</button>
                <button class="operator" onclick="appendOperator('-')">-</button>


                <!-- number buttons -->

                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="calculate()">=</button>


                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="clear" onclick="backspace()">&larr;</button>

                    <!-- zero button is wider -->

                <button class="zero-btn" onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('.')">.</button>
            </div>
        </div>

             <!-- history panel -->

        <div class="history-panel" id="historyPanel">
            <div class="history-header">History</div>
            <div class="history-list" id="historyList">
                <div class="history-empty">No calculations yet</div>
            </div>
        </div>
    </div>

       <!-- footer text at bottom -->

    <div class="footer">PastelCalc Pro by Farwa Adan • v1.2</div>

    <script src="js/script.js"></script>
</body>
</html>
